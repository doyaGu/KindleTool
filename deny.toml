[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "KindleTool signs local operator-controlled packages; the RSA key is not used in an attacker-observable online service. Track upstream rsa issue #19." },
]

[bans]
multiple-versions = "warn"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "GPL-3.0-or-later",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
