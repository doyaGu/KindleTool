name: Scheduled fuzzing

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install nightly --profile minimal
      - run: cargo +nightly install cargo-fuzz --locked
      - name: Fuzz package and archive boundaries
        run: |
          cargo +nightly fuzz run package_reader -- -max_total_time=300
          cargo +nightly fuzz run archive_path -- -max_total_time=300
          cargo +nightly fuzz run manifest_verifier -- -max_total_time=300
          cargo +nightly fuzz run raw_archive -- -max_total_time=300
          cargo +nightly fuzz run encoder_roundtrip -- -max_total_time=300
