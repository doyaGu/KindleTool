name: Rust CI

on:
  push:
    branches: [master]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo test --doc --workspace --locked
      - run: cargo doc -p kindletool --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install 1.85.0 --profile minimal
      - run: cargo +1.85.0 test --workspace --locked

  platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --workspace --locked

  c-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build frozen C oracle
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev nettle-dev zlib1g-dev
          make
      - name: Run bidirectional differential test
        working-directory: rust
        run: cargo test -p kindletool-cli --test oracle --locked
        env:
          KINDLETOOL_C_ORACLE: ${{ github.workspace }}/KindleTool/Release/kindletool

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml
          command: check

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install nightly --profile minimal
      - run: cargo +nightly install cargo-fuzz --locked
      - name: Fuzz untrusted package parsing
        working-directory: rust
        run: cargo +nightly fuzz run package_reader -- -max_total_time=30
