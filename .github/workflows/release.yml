name: Rust release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  gate:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generated table consistency
        run: python3 tools/generate_legacy_tables.py --check

      - name: Install stable quality components
        run: rustup component add rustfmt clippy

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Tests and documentation
        run: |
          cargo test --workspace --locked
          cargo test --doc --workspace --locked
          RUSTDOCFLAGS="-D warnings" cargo doc -p kindletool --no-deps --document-private-items --locked

      - name: MSRV
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          cargo +1.85.0 test --workspace --locked

      - name: Build frozen C oracle
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev nettle-dev zlib1g-dev
          make legacy

      - name: Full bidirectional differential matrix
        run: cargo test -p kindletool-cli --test oracle --locked
        env:
          KINDLETOOL_C_ORACLE: ${{ github.workspace }}/KindleTool/Release/kindletool

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
          command: check

      - name: Parser and verifier fuzz smoke tests
        run: |
          rustup toolchain install nightly --profile minimal
          cargo +nightly install cargo-fuzz --locked
          cargo +nightly fuzz run package_reader -- -max_total_time=20
          cargo +nightly fuzz run archive_path -- -max_total_time=20
          cargo +nightly fuzz run manifest_verifier -- -max_total_time=20

  build:
    name: ${{ matrix.asset }}
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: kindletool.exe
            asset: kindletool-windows-x86_64.exe
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: kindletool
            asset: kindletool-linux-x86_64-musl
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: kindletool
            asset: kindletool-macos-x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            binary: kindletool
            asset: kindletool-macos-aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build standalone executable
        run: cargo build --release --locked --target ${{ matrix.target }} -p kindletool-cli

      - name: Stage release asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}" || true

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 manifest
        working-directory: artifacts
        run: sha256sum kindletool-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          make_latest: true
          files: artifacts/*
